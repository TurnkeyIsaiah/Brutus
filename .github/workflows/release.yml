name: Release Desktop

# Build installers for every OS and publish them to a GitHub Release whenever a
# version tag is pushed (e.g. v1.3.2). electron-updater consumes the release
# artifacts and the generated latest*.yml feeds.
on:
  push:
    tags:
      - "v*.*.*"

# electron-builder needs write access to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: "--win"
          - os: macos-latest
            platform: "--mac"
          - os: ubuntu-latest
            platform: "--linux"

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npx --no-install electron-builder ${{ matrix.platform }} --publish always
        env:
          # electron-builder publishes to the GitHub Releases provider configured
          # in package.json using this token.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS code signing (Developer ID) + notarization. These are scoped to
          # the macOS runner so the .p12 is never picked up as a Windows signing
          # cert on the other runners. CSC_LINK expects the base64-encoded .p12.
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_CERTIFICATE_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
