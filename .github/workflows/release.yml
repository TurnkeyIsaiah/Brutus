name: Release Desktop

# Build installers for every OS and publish them to a GitHub Release whenever a
# version tag is pushed (e.g. v1.3.2). electron-updater consumes the release
# artifacts and the generated latest*.yml feeds.
on:
  push:
    tags:
      - "v*.*.*"

# electron-builder needs write access to create the GitHub Release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: "--win"
          - os: macos-latest
            platform: "--mac"
          - os: ubuntu-latest
            platform: "--linux"

    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Windows/Linux: no signing certs configured. The Apple signing env vars are
      # deliberately omitted here — setting CSC_LINK to an empty string makes
      # electron-builder treat it as a (broken) Windows signing cert path.
      - name: Build and publish
        if: runner.os != 'macOS'
        run: npx --no-install electron-builder ${{ matrix.platform }} --config electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # macOS: code-signed (Developer ID) + notarized. CSC_LINK expects the
      # base64-encoded .p12; the Apple credentials drive notarytool.
      - name: Build and publish (macOS, signed + notarized)
        if: runner.os == 'macOS'
        run: npx --no-install electron-builder ${{ matrix.platform }} --config electron-builder.config.js --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
