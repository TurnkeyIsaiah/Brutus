<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brutus Live Coaching</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Outfit', -apple-system, sans-serif;
      background: transparent;
      color: #fff;
      overflow: hidden;
      user-select: none;
    }
    
    .overlay-container {
      width: 100%;
      height: 100vh;
      background: rgba(10, 10, 18, 0.92);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border: 1px solid rgba(255, 80, 80, 0.3);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    }
    
    /* Header */
    .overlay-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      -webkit-app-region: drag;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .brutus-avatar {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #ff5050, #ff7850);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Mono', monospace;
      font-weight: 700;
      font-size: 16px;
    }
    
    .header-title {
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      text-transform: lowercase;
      color: rgba(255, 80, 80, 0.9);
      letter-spacing: 1px;
    }
    
    .header-status {
      display: flex;
      align-items: center;
      gap: 8px;
      -webkit-app-region: no-drag;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #50ff80;
      box-shadow: 0 0 10px #50ff80;
      animation: pulse 2s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .close-btn {
      width: 24px;
      height: 24px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 6px;
      color: rgba(255, 255, 255, 0.5);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: no-drag;
    }
    
    .close-btn:hover {
      background: rgba(255, 80, 80, 0.3);
      color: #fff;
    }

    /* Header screen capture toggle */
    .header-toggle {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    .header-toggle input[type="checkbox"] { display: none; }
    .header-toggle-slider {
      width: 28px;
      height: 16px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 8px;
      position: relative;
      transition: background 0.2s;
    }
    .header-toggle-slider::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 50%;
      top: 3px;
      left: 3px;
      transition: all 0.2s;
    }
    .header-toggle input:checked + .header-toggle-slider {
      background: rgba(255, 80, 80, 0.6);
    }
    .header-toggle input:checked + .header-toggle-slider::after {
      left: 15px;
      background: #fff;
    }
    .header-toggle-text {
      font-size: 12px;
      opacity: 0.7;
    }

    /* Feedback List */
    .feedback-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .feedback-container::-webkit-scrollbar {
      width: 4px;
    }
    
    .feedback-container::-webkit-scrollbar-track {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 2px;
    }
    
    .feedback-container::-webkit-scrollbar-thumb {
      background: rgba(255, 80, 80, 0.3);
      border-radius: 2px;
    }
    
    .feedback-item {
      background: rgba(255, 80, 80, 0.08);
      border: 1px solid rgba(255, 80, 80, 0.15);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 12px;
      animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
    
    .feedback-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .feedback-type {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    
    .type-warning {
      background: rgba(255, 176, 80, 0.2);
      color: #ffb050;
    }
    
    .type-critical {
      background: rgba(255, 80, 80, 0.2);
      color: #ff5050;
    }
    
    .type-insight {
      background: rgba(80, 150, 255, 0.2);
      color: #5096ff;
    }
    
    .type-good {
      background: rgba(80, 255, 128, 0.2);
      color: #50ff80;
    }

    .type-suggestion {
      background: rgba(160, 100, 255, 0.2);
      color: #a064ff;
      border-left: 3px solid #a064ff;
    }

    .type-brutus {
      background: rgba(255, 80, 80, 0.15);
      color: #ff6060;
    }

    .feedback-time {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      font-family: 'Space Mono', monospace;
    }
    
    .feedback-text {
      font-size: 14px;
      line-height: 1.5;
      color: rgba(255, 255, 255, 0.9);
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255, 255, 255, 0.4);
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    
    .empty-state-text {
      font-size: 14px;
    }
    
    /* Metrics Bar */
    .metrics-bar {
      padding: 16px 20px;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    
    .metric-item {
      text-align: center;
    }
    
    .metric-label {
      font-size: 10px;
      color: rgba(255, 255, 255, 0.4);
      text-transform: lowercase;
      margin-bottom: 4px;
    }
    
    .metric-value {
      font-family: 'Space Mono', monospace;
      font-size: 16px;
      font-weight: 700;
    }
    
    .metric-value.good { color: #50ff80; }
    .metric-value.warning { color: #ffb050; }
    .metric-value.bad { color: #ff5050; }

    /* Quick Actions */
    .quick-actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .action-btn {
      flex: 1;
      padding: 10px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-transform: lowercase;
      font-family: inherit;
    }

    .action-btn span {
      font-size: 14px;
    }

    .action-btn:hover {
      background: rgba(255, 80, 80, 0.1);
      border-color: rgba(255, 80, 80, 0.3);
      color: #fff;
    }

    .action-btn.active {
      background: rgba(255, 80, 80, 0.15);
      border-color: rgba(255, 80, 80, 0.4);
      color: #ff5050;
    }

    /* Note/Research Input */
    .note-input-container,
    .research-input-container {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 8px;
      animation: slideDown 0.2s ease;
    }

    .note-input-container.hidden,
    .research-input-container.hidden {
      display: none;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .note-input,
    .research-input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .note-input:focus,
    .research-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 80, 80, 0.4);
    }

    .note-input::placeholder,
    .research-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .note-send-btn,
    .research-send-btn {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #ff5050, #ff7850);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .note-send-btn:hover,
    .research-send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(255, 80, 80, 0.3);
    }

    .note-send-btn:disabled,
    .research-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Screen Capture Toggle */
    .screen-capture-toggle {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
    }

    .toggle-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      width: 100%;
    }

    .toggle-label input[type="checkbox"] {
      display: none;
    }

    .toggle-slider {
      width: 40px;
      height: 22px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 11px;
      position: relative;
      transition: background 0.3s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      top: 3px;
      left: 3px;
      transition: all 0.3s;
    }

    .toggle-label input[type="checkbox"]:checked + .toggle-slider {
      background: linear-gradient(135deg, #50ff80, #50ffa0);
    }

    .toggle-label input[type="checkbox"]:checked + .toggle-slider::before {
      transform: translateX(18px);
      background: #fff;
    }

    .toggle-text {
      flex: 1;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 500;
    }

    .toggle-label input[type="checkbox"]:checked ~ .toggle-text {
      color: rgba(255, 255, 255, 0.9);
    }

    /* Audio Visualizer */
    .audio-visualizer {
      height: 40px;
      padding: 0 20px 16px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
    }
    
    .audio-bar {
      width: 4px;
      height: 4px;
      background: linear-gradient(to top, #ff5050, #ff7850);
      border-radius: 2px;
      transition: height 0.05s ease;
    }
    
    /* Resize Handle */
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: se-resize;
      -webkit-app-region: no-drag;
    }
    
    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 6px;
      right: 6px;
      width: 8px;
      height: 8px;
      border-right: 2px solid rgba(255, 255, 255, 0.2);
      border-bottom: 2px solid rgba(255, 255, 255, 0.2);
    }

    /* Chat Interface */
    .chat-container {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .chat-input {
      flex: 1;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s;
    }

    .chat-input:focus {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(160, 100, 255, 0.4);
    }

    .chat-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .chat-send-btn {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, #a064ff, #c080ff);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .chat-send-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(160, 100, 255, 0.3);
    }

    .chat-send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .chat-message {
      padding: 10px 14px;
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 13px;
      line-height: 1.4;
      animation: slideIn 0.3s ease;
    }

    .chat-message.user {
      background: rgba(160, 100, 255, 0.15);
      border: 1px solid rgba(160, 100, 255, 0.3);
      color: rgba(255, 255, 255, 0.9);
      margin-left: 20px;
      text-align: right;
    }

    .chat-message.brutus {
      background: rgba(255, 80, 80, 0.1);
      border: 1px solid rgba(255, 80, 80, 0.2);
      color: rgba(255, 255, 255, 0.9);
      margin-right: 20px;
    }

    .chat-label {
      font-size: 10px;
      text-transform: uppercase;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
      opacity: 0.6;
    }


    /* ==================== SOURCE PICKER ==================== */
    .source-picker-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 18, 0.98);
      z-index: 1000;
      border-radius: 20px;
      flex-direction: column;
      padding: 20px;
      overflow: hidden;
    }
    .source-picker-overlay.active { display: flex; }
    .source-picker-title {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 4px;
    }
    .source-picker-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 14px;
    }
    .source-picker-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      overflow-y: auto;
      flex: 1;
    }
    .source-item {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 8px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .source-item:hover {
      border-color: rgba(255,80,80,0.6);
      background: rgba(255,80,80,0.08);
    }
    .source-item img {
      width: 100%;
      aspect-ratio: 16/9;
      object-fit: cover;
      border-radius: 5px;
      background: #111;
    }
    .source-item-name {
      font-size: 10px;
      color: rgba(255,255,255,0.65);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .source-picker-skip {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.3);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: color 0.15s;
    }
    .source-picker-skip:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="overlay-container">
    <!-- Header -->
    <div class="overlay-header">
      <div class="header-left">
        <div class="brutus-avatar">B</div>
        <div class="header-title">brutus AI live coaching</div>
      </div>
      <div class="header-status">
        <div class="status-dot"></div>
        <label class="header-toggle" title="toggle screen capture">
          <input type="checkbox" id="screen-capture-toggle" checked>
          <span class="header-toggle-slider"></span>
          <span class="header-toggle-text">📷</span>
        </label>
        <button class="close-btn" id="close-btn">×</button>
      </div>
    </div>
    
    <!-- Audio Visualizer -->
    <div class="audio-visualizer" id="audio-visualizer">
      <!-- Bars generated by JS -->
    </div>
    
    <!-- Feedback List -->
    <div class="feedback-container" id="feedback-container">
      <div class="empty-state" id="empty-state">
        <div class="empty-state-icon">🎯</div>
        <div class="empty-state-text">listening for your sales call...</div>
      </div>
    </div>
    
    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="action-btn note-btn" id="note-btn" title="Take a quick note">
        <span>📝</span> note
      </button>
      <button class="action-btn research-btn" id="research-btn" title="Request research">
        <span>🔍</span> research
      </button>
    </div>

    <!-- AI Notes Toggle -->
    <div class="screen-capture-toggle">
      <label class="toggle-label">
        <input type="checkbox" id="ai-notes-toggle">
        <span class="toggle-slider"></span>
        <span class="toggle-text">🤖 ai notes</span>
      </label>
    </div>

    <!-- Note Input (Hidden by default) -->
    <div class="note-input-container hidden" id="note-input-container">
      <input type="text" class="note-input" id="note-input" placeholder="quick note...">
      <button class="note-send-btn" id="note-send-btn">→</button>
    </div>

    <!-- Research Input (Hidden by default) -->
    <div class="research-input-container hidden" id="research-input-container">
      <input type="text" class="research-input" id="research-input" placeholder="company or prospect name...">
      <button class="research-send-btn" id="research-send-btn">→</button>
    </div>

    <!-- Chat with Brutus -->
    <div class="chat-container">
      <input type="text" class="chat-input" id="chat-input" placeholder="ask brutus anything...">
      <button class="chat-send-btn" id="chat-send-btn">💬</button>
    </div>

    <!-- Metrics Bar -->
    <div class="metrics-bar">
      <div class="metric-item">
        <div class="metric-label">talk ratio</div>
        <div class="metric-value" id="talk-ratio">--%</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">interrupts</div>
        <div class="metric-value good" id="interrupt-count">0</div>
      </div>
      <div class="metric-item">
        <div class="metric-label">duration</div>
        <div class="metric-value" id="duration">00:00</div>
      </div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>
  </div>
  
  <script>
    // ==================== CONFIG ====================
    let API_URL = 'https://api.brutusai.coach';
    let WS_URL = 'wss://api.brutusai.coach/ws';
    let authToken = null;
    
    let ws = null;
    let isConnected = false;
    let sessionId = null;
    let wsReconnectAttempts = 0;
    let startTime = null;
    let durationInterval = null;
    let audioContext = null;
    let audioMixNode = null;
    let analyser = null;
    let mediaStream = null;
    let mediaRecorder = null;
    let recordingInterval = null;
    let screenStream = null;

    let feedbackItems = [];
    let interruptCount = 0;
    let talkRatio = 0;
    let chunkCounter = 0;
    let repTalkingFrames = 0;
    let totalFrames = 0;
    const TALK_SILENCE_THRESHOLD = 15;

    // ==================== SCREEN CAPTURE TOGGLE ====================
    const screenCaptureToggle = document.getElementById('screen-capture-toggle');
    let isScreenCaptureEnabled = true;

    // Handle screen capture toggle changes
    screenCaptureToggle.addEventListener('change', async (e) => {
      isScreenCaptureEnabled = e.target.checked;
      console.log('[Screen Capture Toggle] Screen capture', isScreenCaptureEnabled ? 'enabled' : 'disabled');

      // If session is active, stop or start screen capture based on toggle
      if (sessionId) {
        if (isScreenCaptureEnabled) {
          await startScreenCapture();
          addFeedback('insight', 'screen capture enabled');
        } else {
          stopScreenCapture();
          addFeedback('insight', 'screen capture disabled');
        }
      }
    });

    // ==================== AI NOTES TOGGLE ====================
    const aiNotesToggle = document.getElementById('ai-notes-toggle');
    let isAiNotesEnabled = false;

    // Handle AI notes toggle changes
    aiNotesToggle.addEventListener('change', (e) => {
      isAiNotesEnabled = e.target.checked;
      console.log('[AI Notes Toggle] AI notes', isAiNotesEnabled ? 'enabled' : 'disabled');

      if (sessionId) {
        if (isAiNotesEnabled) {
          addFeedback('insight', 'ai note-taking enabled');
        } else {
          addFeedback('insight', 'ai note-taking disabled');
        }
      }
    });

    // ==================== NOTES & RESEARCH ====================
    const noteBtn = document.getElementById('note-btn');
    const researchBtn = document.getElementById('research-btn');
    const noteInputContainer = document.getElementById('note-input-container');
    const researchInputContainer = document.getElementById('research-input-container');
    const noteInput = document.getElementById('note-input');
    const researchInput = document.getElementById('research-input');
    const noteSendBtn = document.getElementById('note-send-btn');
    const researchSendBtn = document.getElementById('research-send-btn');

    // Toggle note input
    noteBtn.addEventListener('click', () => {
      const isActive = noteInputContainer.classList.contains('hidden');

      // Hide research input
      researchInputContainer.classList.add('hidden');
      researchBtn.classList.remove('active');

      // Toggle note input
      if (isActive) {
        noteInputContainer.classList.remove('hidden');
        noteBtn.classList.add('active');
        noteInput.focus();
      } else {
        noteInputContainer.classList.add('hidden');
        noteBtn.classList.remove('active');

    // Toggle research input

    // Send note

          },

    // Send research request

    // ==================== CHAT WITH BRUTUS ====================
    const chatInput = document.getElementById('chat-input');
    const chatSendBtn = document.getElementById('chat-send-btn');

    // Send chat message to Brutus
    async function sendChatMessage() {
      const message = chatInput.value.trim();
      if (!message) return;

      chatSendBtn.disabled = true;
      const userMessage = message;
      chatInput.value = '';

      // Add user message to feedback
      addChatMessage('user', userMessage);

      // Send to backend via WebSocket
      if (ws && isConnected) {
        sendToBackend('chat_message', { message: userMessage });
      } else {
        addFeedback('warning', 'not connected. check your backend.');
        chatSendBtn.disabled = false;
      }
    }

    // Add chat message to UI
    function addChatMessage(sender, text) {
      const container = document.getElementById('feedback-container');
      const emptyState = document.getElementById('empty-state');

      if (emptyState) {
        emptyState.style.display = 'none';
      }

      const messageDiv = document.createElement('div');
      messageDiv.className = `chat-message ${sender}`;

      const label = document.createElement('div');
      label.className = 'chat-label';
      label.textContent = sender === 'user' ? 'you' : 'brutus';

      const messageText = document.createTextNode(text);

      messageDiv.appendChild(label);
      messageDiv.appendChild(messageText);

      // Add to beginning
      container.insertBefore(messageDiv, container.firstChild);

      // Limit to 15 messages
      const messages = container.querySelectorAll('.chat-message, .feedback-item');
      if (messages.length > 15) {
        container.removeChild(messages[messages.length - 1]);
      }
    }

    chatSendBtn.addEventListener('click', sendChatMessage);
    chatInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') sendChatMessage();
    });

    // ==================== INIT ====================
    async function init() {
      // Get settings and auth
      const settings = await window.brutus.getSettings();
      API_URL = settings.apiUrl || API_URL;
      WS_URL = API_URL.replace('http', 'ws') + '/ws';
      
      const auth = await window.brutus.getAuth();
      if (!auth || !auth.token) {
        console.error('[Init] No auth token found');
        addFeedback('critical', 'not authenticated. please log in.');
        return;
      }
      authToken = auth.token;
      
      // Init audio visualizer bars
      initAudioBars();
      
      // Listen for monitoring events — show source picker first if screen capture is on
      window.brutus.onMonitoringStarted(async () => {
        if (isScreenCaptureEnabled) {
          await showSourcePicker();
        }
        startSession();
      });
      
      window.brutus.onMonitoringStopped(() => {
        stopSession();
      });
      
      // Start immediately if monitoring is active
      const isMonitoring = await window.brutus.isMonitoring();
      if (isMonitoring) {
        startSession();
      }
    }
    
    // ==================== AUDIO VISUALIZER ====================
    function initAudioBars() {
      const visualizer = document.getElementById('audio-visualizer');
      visualizer.innerHTML = '';
      for (let i = 0; i < 32; i++) {
        const bar = document.createElement('div');
        bar.className = 'audio-bar';
        visualizer.appendChild(bar);
      }
    }
    
    function updateAudioBars(dataArray) {
      const bars = document.querySelectorAll('.audio-bar');
      bars.forEach((bar, i) => {
        const value = dataArray[i] || 0;
        const height = Math.max(4, (value / 255) * 35);
        bar.style.height = height + 'px';
      });
    }
    
    // ==================== SESSION MANAGEMENT ====================
    async function startSession() {
      // Clear previous session messages and state
      feedbackItems = [];
      chunkCounter = 0;
      interruptCount = 0;
      repTalkingFrames = 0;
      totalFrames = 0;
      document.getElementById('talk-ratio').textContent = '--%';
      document.getElementById('talk-ratio').className = 'metric-value';
      document.getElementById('interrupt-count').textContent = '0';
      document.getElementById('interrupt-count').className = 'metric-value good';
      const container = document.getElementById('feedback-container');
      container.innerHTML = '<div class="empty-state" id="empty-state"><div class="empty-state-icon">🎯</div><div class="empty-state-text">listening for your sales call...</div></div>';

      try {
        // Start session on backend
        const response = await fetch(`${API_URL}/live/start`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${authToken}`
          }
        });
        
        const data = await response.json();
        if (!data || !data.session || !data.session.id) {
          throw new Error('Invalid session response from backend');
        }
        sessionId = data.session.id;
        
        // Connect WebSocket
        connectWebSocket();

        // Start audio capture
        await startAudioCapture();

        // Start duration timer
        startTime = Date.now();
        durationInterval = setInterval(updateDuration, 1000);

        // Clear empty state
        document.getElementById('empty-state').style.display = 'none';

        // Add initial feedback
        addFeedback('insight', 'monitoring started. let\'s see what you\'ve got.');

        // Start screen capture (only if enabled) - non-blocking, won't abort session on failure
        if (isScreenCaptureEnabled) {
          startScreenCapture();
        } else {
          console.log('[Session] Screen capture disabled by toggle - skipping');
        }

      } catch (error) {
        console.error('Failed to start session:', error);
        addFeedback('critical', 'failed to connect. check your backend.');
      }
    }
    
    async function stopSession() {
      // Stop audio capture
      stopAudioCapture();

      // Stop screen capture
      stopScreenCapture();

      // Stop duration timer
      if (durationInterval) {
        clearInterval(durationInterval);
        durationInterval = null;
      }
      
      // End session on backend
      if (sessionId) {
        try {
          const endRes = await fetch(`${API_URL}/live/end`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${authToken}`
            },
            body: JSON.stringify({ sessionId })
          });
          const endData = await endRes.json();
          if (endData.analysis) {
            showPostCallSummary(endData.analysis);
            updateTalkRatio(endData.analysis.talkRatio);
            interruptCount = endData.analysis.interruptionCount || 0;
            const intEl = document.getElementById('interrupt-count');
            intEl.textContent = interruptCount;
            intEl.className = 'metric-value ' + (interruptCount > 3 ? 'bad' : interruptCount > 1 ? 'warning' : 'good');
          } else {
            addFeedback('insight', 'session ended. review your results in the dashboard.');
          }
        } catch (e) {
          console.error('Failed to end session:', e);
          addFeedback('insight', 'session ended.');
        }
      }

      // Disconnect WebSocket
      if (ws) {
        ws.close();
        ws = null;
      }

      sessionId = null;
      startTime = null;
    }
    
    // ==================== WEBSOCKET ====================
    function connectWebSocket() {
      ws = new WebSocket(`${WS_URL}?token=${authToken}`);
      
      ws.onopen = () => {
        isConnected = true;
        wsReconnectAttempts = 0; // Reset reconnect counter on successful connection
        console.log('WebSocket connected');
      };
      
      ws.onmessage = (event) => {
        try {
          const message = JSON.parse(event.data);

          if (message.type === 'brutus_feedback' && message.payload.code === 'OUT_OF_TOKENS') {
            addFeedback('critical', "you're out of tokens. add credits at app.brutusai.coach to continue.");
            stopSession();
            return;
          }

          if (message.type === 'brutus_feedback') {
            // Only show feedback when triage fires — complete silence otherwise
            if (message.payload.coach === true) {
              addFeedback('brutus', message.payload.feedback);
              playFeedbackPing();
            }
          }

          if (message.type === 'chat_response') {
            // Brutus responded to user's chat message
            addChatMessage('brutus', message.payload.message);
            chatSendBtn.disabled = false;
          }
        } catch (e) {
          console.error('Failed to parse message:', e);
        }
      };
      
      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
      
      ws.onclose = () => {
        isConnected = false;
        console.log('WebSocket disconnected');

        // Attempt to reconnect with exponential backoff
        if (sessionId) {
          const maxRetries = 10;
          if (wsReconnectAttempts < maxRetries) {
            wsReconnectAttempts++;
            const delay = Math.min(1000 * Math.pow(2, wsReconnectAttempts - 1), 30000);
            console.log(`[WebSocket] Reconnecting in ${delay}ms (attempt ${wsReconnectAttempts}/${maxRetries})`);
            setTimeout(connectWebSocket, delay);
          } else {
            console.error('[WebSocket] Max reconnect attempts reached');
            addFeedback('critical', 'connection lost. please restart monitoring.');
          }
        }
      };
    }
    
    function sendToBackend(type, payload) {
      if (ws && isConnected) {
        ws.send(JSON.stringify({ type, payload }));
      }
    }
    
    // ==================== AUDIO CAPTURE ====================
    async function startAudioCapture() {
      try {
        console.log('[Audio Capture] Starting audio capture (mic + system audio)...');

        // Step 1: Get microphone stream
        console.log('[Audio Capture] Requesting microphone access...');
        const micStream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: false,  // Disable to preserve both voices
            noiseSuppression: false,  // Disable to preserve both voices
            autoGainControl: false,   // Disable to preserve natural levels
            sampleRate: 16000
          }
        });
        console.log('[Audio Capture] Microphone access granted');

        // Set up audio mix — system audio is added by startScreenCapture once display stream is ready
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        audioMixNode = audioContext.createMediaStreamDestination();

        // Connect microphone
        const micSource = audioContext.createMediaStreamSource(micStream);
        const micGain = audioContext.createGain();
        micGain.gain.value = 1.0;
        micSource.connect(micGain);
        micGain.connect(audioMixNode);

        // The mixed stream (system audio will be spliced in by startScreenCapture)
        mediaStream = audioMixNode.stream;

        // Set up audio visualization (from mic only for visual feedback)
        analyser = audioContext.createAnalyser();
        micSource.connect(analyser);  // Visualize mic input
        analyser.fftSize = 64;

        const bufferLength = analyser.frequencyBinCount;
        const dataArray = new Uint8Array(bufferLength);

        // Update visualization and track talk ratio
        let vizFrameCount = 0;
        function updateVisualization() {
          if (!analyser) return;

          analyser.getByteFrequencyData(dataArray);
          updateAudioBars(dataArray);

          // Measure rep talk ratio from mic level
          const avgLevel = dataArray.reduce((sum, v) => sum + v, 0) / dataArray.length;
          if (avgLevel > TALK_SILENCE_THRESHOLD) repTalkingFrames++;
          totalFrames++;

          // Update display every ~300 frames (~5s at 60fps)
          if (++vizFrameCount >= 300) {
            vizFrameCount = 0;
            if (totalFrames > 0) updateTalkRatio(Math.round((repTalkingFrames / totalFrames) * 100));
          }

          requestAnimationFrame(updateVisualization);
        }
        updateVisualization();

        // Set up media recorder to send chunks (records the MIXED stream)
        mediaRecorder = new MediaRecorder(mediaStream, {
          mimeType: 'audio/webm;codecs=opus'
        });

        let chunks = [];

        mediaRecorder.ondataavailable = (event) => {
          if (event.data.size > 0) {
            chunks.push(event.data);
          }
        };

        mediaRecorder.onstop = async () => {
          if (chunks.length === 0) return;

          const blob = new Blob(chunks, { type: 'audio/webm' });
          chunks = [];

          // Convert to base64 and send
          const reader = new FileReader();
          reader.onloadend = async () => {
            const audioBase64 = reader.result.split(',')[1];

            chunkCounter++;
            // Capture screenshot on-demand every 4th chunk (~2 minutes)
            const shouldCapture = isScreenCaptureEnabled && screenStream && (chunkCounter % 4 === 0);
            const screenshotData = shouldCapture ? await captureScreenshot() : null;

            sendToBackend('monitoring_data', {
              sessionId,
              audioData: audioBase64,
              screenshot: screenshotData,
              timestamp: Date.now(),
              timeIntoCall: Math.floor((Date.now() - startTime) / 1000),
              mimeType: 'audio/webm',
              aiNotesEnabled: isAiNotesEnabled
            });
          };
          reader.readAsDataURL(blob);
        };

        // Record in 30 second chunks
        mediaRecorder.start();
        recordingInterval = setInterval(() => {
          if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            mediaRecorder.start();
          }
        }, 30000);

        console.log('[Audio Capture] Audio capture started successfully');
        addFeedback('insight', 'mic active. waiting for screen capture...');

      } catch (error) {
        console.error('[Audio Capture] ERROR: Failed to capture audio');
        console.error('[Audio Capture] Error name:', error.name);
        console.error('[Audio Capture] Error message:', error.message);
        console.error('[Audio Capture] Error stack:', error.stack);
        addFeedback('critical', 'microphone access denied. enable it to get coaching.');
      }
    }
    
    function stopAudioCapture() {
      // Stop recording interval
      if (recordingInterval) {
        clearInterval(recordingInterval);
        recordingInterval = null;
      }
      
      // Stop media recorder
      if (mediaRecorder && mediaRecorder.state !== 'inactive') {
        mediaRecorder.stop();
        mediaRecorder = null;
      }
      
      // Stop media stream
      if (mediaStream) {
        mediaStream.getTracks().forEach(track => track.stop());
        mediaStream = null;
      }
      
      // Close audio context
      if (audioContext) {
        audioContext.close();
        audioContext = null;
        analyser = null;
        audioMixNode = null;
      }
      
      // Reset audio bars
      const bars = document.querySelectorAll('.audio-bar');
      bars.forEach(bar => bar.style.height = '4px');
    }

    // ==================== SCREEN CAPTURE ====================
    async function startScreenCapture() {
      try {
        console.log('[Screen Capture] Attempting to start screen capture via getDisplayMedia...');

        // Request video + audio (loopback provided by main process handler)
        screenStream = await navigator.mediaDevices.getDisplayMedia({
          video: { width: { max: 1920 }, height: { max: 1080 } },
          audio: true
        });

        console.log('[Screen Capture] Media stream created successfully');

        // Connect system audio (loopback) to the mic mix if available
        const audioTracks = screenStream.getAudioTracks();
        if (audioTracks.length > 0 && audioContext && audioMixNode) {
          try {
            const sysSource = audioContext.createMediaStreamSource(new MediaStream(audioTracks));
            const sysGain = audioContext.createGain();
            sysGain.gain.value = 1.0;
            sysSource.connect(sysGain);
            sysGain.connect(audioMixNode);
            console.log('[Screen Capture] System audio connected to mix');
            addFeedback('insight', 'capturing both sides of the conversation.');
          } catch (e) {
            console.warn('[Screen Capture] Could not connect system audio:', e.message);
            addFeedback('insight', 'screen capture active. audio mix unavailable.');
          }
        } else {
          console.log('[Screen Capture] No system audio in display stream');
          addFeedback('insight', 'screen capture active. capturing your voice only.');
        }

      } catch (error) {
        console.error('[Screen Capture] Failed:', error.name, error.message);
        addFeedback('warning', `screen capture failed: ${error.message}. continuing with audio only.`);
      }
    }

    async function captureScreenshot() {
      if (!screenStream) return null;

      try {
        const video = document.createElement('video');
        video.srcObject = screenStream;
        video.autoplay = true;

        await new Promise((resolve, reject) => {
          const timeout = setTimeout(() => reject(new Error('video metadata timeout')), 5000);
          video.onloadedmetadata = () => { clearTimeout(timeout); video.play(); resolve(); };
        });

        const MAX_W = 960, MAX_H = 540;
        const scale = Math.min(MAX_W / video.videoWidth, MAX_H / video.videoHeight, 1);
        const canvas = document.createElement('canvas');
        canvas.width = Math.round(video.videoWidth * scale);
        canvas.height = Math.round(video.videoHeight * scale);
        canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);

        video.srcObject = null;
        return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];

      } catch (error) {
        console.error('[Screenshot] Failed:', error.message);
        return null;
      }
    }

    function stopScreenCapture() {
      if (screenStream) {
        screenStream.getTracks().forEach(track => track.stop());
        screenStream = null;
      }
    }

    // ==================== UI UPDATES ====================
    function addFeedback(type, text) {
      const container = document.getElementById('feedback-container');
      const emptyState = document.getElementById('empty-state');
      
      if (emptyState) {
        emptyState.style.display = 'none';
      }
      
      const now = new Date();
      const timeStr = now.toLocaleTimeString('en-US', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
      
      const item = document.createElement('div');
      item.className = 'feedback-item';

      const header = document.createElement('div');
      header.className = 'feedback-header';

      const typeSpan = document.createElement('span');
      typeSpan.className = `feedback-type type-${type}`;
      typeSpan.textContent = type;

      const timeSpan = document.createElement('span');
      timeSpan.className = 'feedback-time';
      timeSpan.textContent = timeStr;

      header.appendChild(typeSpan);
      header.appendChild(timeSpan);

      const textDiv = document.createElement('div');
      textDiv.className = 'feedback-text';
      textDiv.textContent = text;

      item.appendChild(header);
      item.appendChild(textDiv);
      
      // Add to beginning
      container.insertBefore(item, container.firstChild);
      
      // Keep only last 10 items
      feedbackItems.unshift({ type, text, time: timeStr });
      if (feedbackItems.length > 10) {
        feedbackItems.pop();
        if (container.children.length > 10) {
          container.removeChild(container.lastChild);
        }
      }
    }
    
    function updateTalkRatio(ratio) {
      talkRatio = ratio;
      const el = document.getElementById('talk-ratio');
      el.textContent = `${Math.round(ratio)}%`;
      el.className = 'metric-value ' + (ratio > 60 ? 'bad' : ratio > 45 ? 'warning' : 'good');
    }
    
    function updateDuration() {
      if (!startTime) return;
      
      const elapsed = Math.floor((Date.now() - startTime) / 1000);
      const minutes = Math.floor(elapsed / 60);
      const seconds = elapsed % 60;
      
      document.getElementById('duration').textContent =
        `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }
    
    // ==================== AUDIO PING ====================
    function playFeedbackPing() {
      try {
        const pingCtx = new AudioContext();
        const osc = pingCtx.createOscillator();
        const gain = pingCtx.createGain();
        osc.connect(gain);
        gain.connect(pingCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, pingCtx.currentTime);
        gain.gain.setValueAtTime(0.08, pingCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, pingCtx.currentTime + 0.2);
        osc.start(pingCtx.currentTime);
        osc.stop(pingCtx.currentTime + 0.2);
      } catch (e) {}
    }

    // ==================== POST-CALL SUMMARY ====================
    function showPostCallSummary(analysis) {
      const score = analysis.overallScore || 0;
      const scoreClass = score >= 70 ? 'good' : score >= 50 ? 'warning' : 'bad';

      const container = document.getElementById('feedback-container');
      const emptyState = document.getElementById('empty-state');
      if (emptyState) emptyState.style.display = 'none';

      const item = document.createElement('div');
      item.className = 'feedback-item';

      const header = document.createElement('div');
      header.className = 'feedback-header';

      const typeSpan = document.createElement('span');
      typeSpan.className = 'feedback-type type-brutus';
      typeSpan.textContent = 'call complete';

      const scoreSpan = document.createElement('span');
      scoreSpan.className = `metric-value ${scoreClass}`;
      scoreSpan.textContent = `${score}/100`;

      header.appendChild(typeSpan);
      header.appendChild(scoreSpan);

      const roastDiv = document.createElement('div');
      roastDiv.className = 'feedback-text';
      roastDiv.textContent = analysis.overallRoast || 'call complete.';

      item.appendChild(header);
      item.appendChild(roastDiv);

      if (analysis.actionItems?.length) {
        const actionsDiv = document.createElement('div');
        actionsDiv.style.cssText = 'margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.4;';
        actionsDiv.textContent = 'next: ' + analysis.actionItems.slice(0, 2).join(' · ');
        item.appendChild(actionsDiv);
      }

      container.insertBefore(item, container.firstChild);
    }

    // ==================== WINDOW CONTROLS ====================
    document.getElementById('close-btn').addEventListener('click', async () => {
      await window.brutus.stopMonitoring();
    });

    // ==================== SOURCE PICKER ====================
    function showSourcePicker() {
      return new Promise(async (resolve) => {
        const modal = document.getElementById('source-picker');
        const grid = document.getElementById('source-picker-grid');
        const skip = document.getElementById('source-picker-skip');

        modal.classList.add('active');
        grid.innerHTML = '<div style="color:rgba(255,255,255,0.3);font-size:11px;grid-column:1/-1;text-align:center;padding:20px;">loading windows...</div>';

        let sources = [];
        try {
          sources = await window.brutus.getScreenSources();
        } catch (e) {
          console.error('[SourcePicker] Failed:', e);
        }

        if (sources.length === 0) {
          modal.classList.remove('active');
          resolve(null);
          return;
        }

        grid.innerHTML = '';
        sources.forEach(source => {
          const item = document.createElement('div');
          item.className = 'source-item';
          item.innerHTML = `
            <img src="${source.thumbnail}" alt="${source.name}">
            <div class="source-item-name">${source.name}</div>
          `;
          item.addEventListener('click', async () => {
            modal.classList.remove('active');
            await window.brutus.setSelectedSource(source.id);
            resolve(source.id);
          });
          grid.appendChild(item);
        });

        skip.onclick = () => {
          modal.classList.remove('active');
          resolve(null);
        };
      });
    }

    // ==================== START ====================
    init();
  </script>
