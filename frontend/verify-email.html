<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brutus AI — Verify Email</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Outfit', sans-serif; background: linear-gradient(135deg, #0a0a12 0%, #12121f 30%, #0d1a2d 70%, #0a0a12 100%); color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .blob-container { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .morphing-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
        .blob-1 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(255,80,80,0.6) 0%, transparent 70%); top: 10%; left: 15%; animation: float1 25s ease-in-out infinite; }
        .blob-2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(80,150,255,0.5) 0%, transparent 70%); top: 50%; right: 10%; animation: float2 30s ease-in-out infinite; }
        @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,-30px) scale(1.1);}66%{transform:translate(-30px,50px) scale(0.9);} }
        @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(-40px,40px) scale(0.95);}66%{transform:translate(30px,-20px) scale(1.05);} }
        .auth-card { position: relative; z-index: 10; background: rgba(20,20,35,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,80,80,0.2); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; margin: 20px; text-align: center; }
        .auth-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 32px; }
        .auth-logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #ff5050, #ff7850); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 24px; color: white; box-shadow: 0 4px 20px rgba(255,80,80,0.4); }
        .auth-logo-text { font-family: 'Space Mono', monospace; font-size: 28px; font-weight: 700; }
        .auth-logo-text span { color: #ff5050; }
        h2 { font-size: 22px; font-weight: 600; margin-bottom: 12px; }
        .status-msg { font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.6; margin-bottom: 24px; }
        .status-msg.success { color: #50ff80; }
        .status-msg.error { color: #ff5050; }
        .auth-btn { display: inline-block; padding: 14px 28px; background: linear-gradient(135deg, #ff5050, #ff7850); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.3s ease; text-transform: lowercase; text-decoration: none; }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,80,80,0.3); }
        .secondary-link { display: block; margin-top: 20px; color: rgba(255,255,255,0.5); font-size: 13px; text-decoration: none; }
        .secondary-link:hover { color: rgba(255,255,255,0.8); }
        .spinner { display: inline-block; width: 36px; height: 36px; border: 3px solid rgba(255,80,80,0.2); border-top-color: #ff5050; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="blob-container">
        <div class="morphing-blob blob-1"></div>
        <div class="morphing-blob blob-2"></div>
    </div>
    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">B</div>
            <div class="auth-logo-text">Brutus <span>AI</span></div>
        </div>

        <div id="loadingState">
            <div class="spinner"></div>
            <h2>verifying your email...</h2>
            <p class="status-msg">hang tight.</p>
        </div>

        <div id="successState" style="display:none">
            <h2>email verified.</h2>
            <p class="status-msg success">500,000 free tokens just landed in your account. Brutus is ready.</p>
            <a href="login.html" class="auth-btn">log in</a>
        </div>

        <div id="errorState" style="display:none">
            <h2>verification failed</h2>
            <p class="status-msg error" id="errorMsg">this verification link is invalid or has expired.</p>
            <a href="login.html" class="auth-btn">go to login</a>
            <a href="login.html" class="secondary-link">already verified? log in →</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.brutusai.coach';
        const token = new URLSearchParams(window.location.search).get('token');

        const showState = (id) => {
            ['loadingState', 'successState', 'errorState'].forEach(s => {
                document.getElementById(s).style.display = s === id ? 'block' : 'none';
            });
        };

        const showError = (msg) => {
            document.getElementById('errorMsg').textContent = msg || 'this verification link is invalid or has expired.';
            showState('errorState');
        };

        if (!token) {
            showError('no verification token in this link.');
        } else {
            fetch(`${API_URL}/auth/verify-email`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            })
            .then(async (res) => {
                const data = await res.json().catch(() => ({}));
                if (res.ok) {
                    showState('successState');
                } else {
                    showError(data.error?.message);
                }
            })
            .catch(() => showError('something went wrong. try again in a minute.'));
        }
    </script>
</body>
</html>
