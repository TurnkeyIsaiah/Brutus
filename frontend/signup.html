<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brutus.ai — Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a12 0%, #12121f 30%, #0d1a2d 70%, #0a0a12 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .blob-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .morphing-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
        }
        .blob-1 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(255,80,80,0.6) 0%, transparent 70%);
            top: 10%; left: 15%;
            animation: float1 25s ease-in-out infinite;
        }
        .blob-2 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(80,150,255,0.5) 0%, transparent 70%);
            top: 50%; right: 10%;
            animation: float2 30s ease-in-out infinite;
        }
        @keyframes float1 {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(50px,-30px) scale(1.1); }
            66% { transform: translate(-30px,50px) scale(0.9); }
        }
        @keyframes float2 {
            0%,100% { transform: translate(0,0) scale(1); }
            33% { transform: translate(-40px,40px) scale(0.95); }
            66% { transform: translate(30px,-20px) scale(1.05); }
        }

        .auth-card {
            position: relative;
            z-index: 10;
            background: rgba(20, 20, 35, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 80, 80, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            margin: 20px;
        }

        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .auth-logo-icon {
            width: 50px; height: 50px;
            background: linear-gradient(135deg, #ff5050, #ff7850);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 24px;
            color: white;
            box-shadow: 0 4px 20px rgba(255,80,80,0.4);
        }
        .auth-logo-text {
            font-family: 'Space Mono', monospace;
            font-size: 28px;
            font-weight: 700;
        }
        .auth-logo-text span { color: #ff5050; }

        h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            text-align: center;
            margin-bottom: 28px;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .auth-input {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }
        .auth-input:focus {
            border-color: rgba(255,80,80,0.5);
            background: rgba(255,255,255,0.08);
        }
        .auth-input::placeholder { color: rgba(255,255,255,0.4); }

        .auth-btn {
            padding: 14px;
            background: linear-gradient(135deg, #ff5050, #ff7850);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.3s ease;
            text-transform: lowercase;
        }
        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255,80,80,0.3);
        }
        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .auth-error {
            color: #ff5050;
            font-size: 13px;
            text-align: center;
            padding: 10px;
            background: rgba(255,80,80,0.1);
            border-radius: 8px;
            display: none;
        }
        .auth-error.visible { display: block; }

        .terms {
            font-size: 12px;
            color: rgba(255,255,255,0.35);
            text-align: center;
            line-height: 1.5;
        }

        .auth-footer {
            margin-top: 24px;
            text-align: center;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }
        .auth-footer a {
            color: #ff5050;
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="blob-container">
        <div class="morphing-blob blob-1"></div>
        <div class="morphing-blob blob-2"></div>
    </div>

    <div class="auth-card">
        <div class="auth-logo">
            <div class="auth-logo-icon">B</div>
            <div class="auth-logo-text">brutus <span>AI</span></div>
        </div>

        <h2>start your trial</h2>
        <p class="subtitle">1,000,000 free tokens on signup. no credit card required.</p>

        <form class="auth-form" id="signupForm">
            <div id="authError" class="auth-error"></div>
            <input type="text" class="auth-input" id="name" placeholder="full name" required autocomplete="name">
            <input type="email" class="auth-input" id="email" placeholder="email" required autocomplete="email">
            <input type="password" class="auth-input" id="password" placeholder="password (8+ characters)" required autocomplete="new-password" minlength="8">
            <button type="submit" class="auth-btn" id="signupBtn">create account</button>
            <p class="terms">by signing up you agree to be brutally judged on every call you make.</p>
        </form>

        <div class="auth-footer">
            already have an account? <a href="login.html">sign in</a>
        </div>
    </div>

    <script>
        const API_URL = 'https://api.brutusai.coach';

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const errorEl = document.getElementById('authError');
            errorEl.classList.remove('visible');
            btn.disabled = true;
            btn.textContent = 'creating account...';

            try {
                const res = await fetch(`${API_URL}/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value.trim(),
                        email: document.getElementById('email').value.trim(),
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (!res.ok) {
                    throw new Error(data.error?.message || 'Signup failed');
                }

                localStorage.setItem('brutus_token', data.token);
                localStorage.setItem('brutus_user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } catch (err) {
                errorEl.textContent = err.message;
                errorEl.classList.add('visible');
                btn.disabled = false;
                btn.textContent = 'create account';
            }
        });
    </script>
</body>
</html>
