<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Rep DNA Test — What Kind of Rep Are You? | Brutus AI</title>
    <meta name="description" content="15 questions. Instant results. Find out your exact sales archetype and the blind spots that are killing your close rate.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        html { background: #0a0a12; }
        :root {
            --bg-dark: #0a0a12;
            --bg-card: rgba(20, 20, 35, 0.8);
            --red-primary: #ff5050;
            --red-secondary: #ff7850;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.6);
            --border-subtle: rgba(255, 255, 255, 0.1);
            --border-red: rgba(255, 80, 80, 0.2);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0a0a12 0%, #12121f 30%, #0d1a2d 70%, #0a0a12 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }
        #neural-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .blob-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; overflow: hidden; }
        .morphing-blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15; }
        .blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(255,80,80,0.6) 0%, transparent 70%); top: 5%; left: 10%; animation: float1 25s ease-in-out infinite; }
        .blob-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(80,150,255,0.5) 0%, transparent 70%); top: 40%; right: 5%; animation: float2 30s ease-in-out infinite; }
        .blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(200,80,255,0.4) 0%, transparent 70%); bottom: 10%; left: 25%; animation: float3 20s ease-in-out infinite; }
        @keyframes float1 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(50px,-30px) scale(1.1)} 66%{transform:translate(-30px,50px) scale(0.9)} }
        @keyframes float2 { 0%,100%{transform:translate(0,0) scale(1)} 33%{transform:translate(-40px,40px) scale(0.95)} 66%{transform:translate(30px,-20px) scale(1.05)} }
        @keyframes float3 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-40px) scale(1.1)} }

        /* Touch quality */
        button, a { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }

        /* Nav */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; padding: max(20px, env(safe-area-inset-top)) 40px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(10,10,18,0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border-subtle); }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
        .logo-icon { width: 42px; height: 42px; background: linear-gradient(135deg, var(--red-primary), var(--red-secondary)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-weight: 700; font-size: 20px; color: white; box-shadow: 0 4px 20px rgba(255,80,80,0.3); }
        .logo-text { font-family: 'Space Mono', monospace; font-size: 20px; font-weight: 700; color: white; }
        .logo-text span { color: var(--red-primary); }
        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.3s; text-transform: lowercase; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-cta { padding: 10px 24px; background: linear-gradient(135deg, var(--red-primary), var(--red-secondary)); border-radius: 30px; color: white !important; font-weight: 600; transition: transform 0.3s, box-shadow 0.3s; }
        .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,80,80,0.4); }
        .mobile-menu-btn { display: none; background: none; border: 1px solid var(--border-subtle); color: var(--text-secondary); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 13px; }

        /* Content wrapper */
        .content { position: relative; z-index: 10; padding-top: 82px; }

        /* Panel style (shared across all sections) */
        .panel {
            background: rgba(20,20,35,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,80,80,0.2);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        /* ── HERO ── */
        #phase-hero { min-height: calc(100vh - 82px); display: flex; align-items: center; justify-content: center; padding: 24px 20px; text-align: center; }
        .hero-inner { max-width: 600px; }
        .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px; background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); border-radius: 30px; font-size: 13px; color: var(--red-primary); margin-bottom: 14px; font-family: 'Space Mono', monospace; text-transform: lowercase; letter-spacing: 0.06em; }
        .hero-badge::before { content: ''; width: 7px; height: 7px; background: var(--red-primary); border-radius: 50%; animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .hero-inner h1 { font-family: 'Space Mono', monospace; font-size: clamp(28px, 6vw, 56px); font-weight: 700; line-height: 1.15; margin-bottom: 14px; color: #fff; }
        .hero-inner h1 span { color: var(--red-primary); }
        .hero-inner p { font-size: 16px; color: rgba(255,255,255,0.55); line-height: 1.6; margin-bottom: 20px; max-width: 480px; margin-left: auto; margin-right: auto; }
        .hero-meta { display: flex; justify-content: center; gap: 28px; margin-bottom: 20px; flex-wrap: wrap; }
        .hero-meta span { font-size: 13px; color: rgba(255,255,255,0.3); font-family: 'Space Mono', monospace; display: flex; align-items: center; gap: 6px; }
        .hero-meta span::before { content: '→'; color: var(--red-primary); }
        .btn-start { padding: 16px 40px; background: linear-gradient(135deg, var(--red-primary), var(--red-secondary)); border: none; border-radius: 14px; color: #fff; font-size: 16px; font-weight: 700; font-family: 'Space Mono', monospace; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 24px rgba(255,80,80,0.35); text-transform: lowercase; min-height: 52px; }
        .btn-start:hover { transform: translateY(-3px); box-shadow: 0 10px 32px rgba(255,80,80,0.5); }

        /* ── QUESTIONS ── */
        #phase-questions { min-height: calc(100vh - 82px); display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
        .question-wrap { max-width: 560px; width: 100%; }
        .progress-bar-outer { height: 3px; background: rgba(255,255,255,0.07); border-radius: 2px; margin-bottom: 28px; }
        .progress-bar-inner { height: 3px; background: linear-gradient(90deg, var(--red-primary), var(--red-secondary)); border-radius: 2px; transition: width 0.4s ease; box-shadow: 0 0 8px rgba(255,80,80,0.4); }
        .q-meta { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: rgba(255,80,80,0.6); margin-bottom: 10px; }
        .q-scenario { font-size: clamp(15px, 2.5vw, 18px); font-weight: 600; color: #fff; line-height: 1.55; margin-bottom: 24px; }
        .answer-btn {
            display: block; width: 100%; text-align: left; padding: 16px 18px;
            background: rgba(20,20,35,0.7); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px; color: rgba(255,255,255,0.8); font-size: 14px; line-height: 1.5;
            cursor: pointer; transition: all 0.2s; margin-bottom: 10px; font-family: inherit;
            min-height: 56px;
        }
        .answer-btn:hover { background: rgba(255,80,80,0.07); border-color: rgba(255,80,80,0.3); color: #fff; transform: translateX(4px); }
        .answer-btn.selected { background: rgba(255,80,80,0.1); border-color: rgba(255,80,80,0.5); color: #fff; }

        /* ── EMAIL GATE ── */
        #phase-email { min-height: calc(100vh - 82px); display: flex; align-items: center; justify-content: center; padding: 40px 16px; }
        .email-wrap { max-width: 480px; width: 100%; display: flex; flex-direction: column; gap: 16px; }
        .result-teaser-card { overflow: hidden; }
        .result-teaser-card .accent-bar { height: 3px; }
        .result-teaser-card .inner { padding: 24px; }
        .archetype-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; margin-bottom: 12px; }
        .archetype-badge span { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; }
        .one-liner-blur { font-style: italic; font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.4; filter: blur(5px); user-select: none; margin-bottom: 20px; }
        .locked-items { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .locked-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: 8px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); }
        .locked-item-arrow { font-size: 12px; color: rgba(255,80,80,0.5); flex-shrink: 0; }
        .locked-item-label { font-size: 13px; color: rgba(255,255,255,0.35); font-family: 'Space Mono', monospace; }
        .locked-badge { margin-left: auto; font-size: 10px; padding: 2px 8px; border-radius: 4px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.2); font-family: 'Space Mono', monospace; letter-spacing: 0.08em; }
        .email-form { display: flex; gap: 10px; }
        .email-input { flex: 1; padding: 13px 16px; border-radius: 12px; font-size: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; outline: none; transition: all 0.3s; font-family: inherit; }
        .email-input:focus { border-color: rgba(255,80,80,0.5); background: rgba(255,255,255,0.08); }
        .btn-unlock { padding: 13px 20px; border-radius: 12px; font-weight: 700; font-size: 14px; color: #fff; background: linear-gradient(135deg, var(--red-primary), var(--red-secondary)); border: none; cursor: pointer; transition: all 0.3s; white-space: nowrap; box-shadow: 0 4px 20px rgba(255,80,80,0.3); font-family: inherit; }
        .btn-unlock:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(255,80,80,0.45); }
        .email-fine-print { font-size: 11px; color: rgba(255,255,255,0.2); text-align: center; margin-top: 6px; }
        .email-error { font-size: 12px; color: var(--red-primary); font-family: 'Space Mono', monospace; margin-top: 6px; }

        /* ── RESULTS ── */
        #phase-results { padding: 40px 16px 60px; }
        .results-inner { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }
        .results-heading { text-align: center; }
        .results-label { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: rgba(255,80,80,0.6); margin-bottom: 8px; }
        .results-title { font-family: 'Space Mono', monospace; font-size: clamp(24px, 5vw, 34px); font-weight: 700; color: #fff; }

        /* Archetype card */
        .archetype-card { overflow: hidden; border-radius: 20px; border: 1px solid rgba(255,80,80,0.25); background: rgba(20,20,35,0.95); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
        .archetype-card .accent-bar { height: 3px; }
        .archetype-card .card-body { padding: 28px; }
        .card-badge { display: inline-block; padding: 4px 12px; border-radius: 6px; margin-bottom: 10px; }
        .card-badge-text { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; }
        .card-one-liner { font-style: italic; font-size: 15px; color: rgba(255,255,255,0.6); line-height: 1.4; margin-bottom: 18px; }
        .card-divider { height: 1px; background: rgba(255,80,80,0.1); margin-bottom: 18px; }
        .card-section-label { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
        .card-list { list-style: none; display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
        .card-list li { display: flex; gap: 8px; font-size: 13px; color: rgba(255,255,255,0.8); }
        .card-list li span { flex-shrink: 0; }
        .brutus-says { background: rgba(255,80,80,0.06); border: 1px solid rgba(255,80,80,0.15); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; }
        .brutus-says-label { font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700; text-transform: lowercase; letter-spacing: 0.08em; color: rgba(255,80,80,0.8); margin-bottom: 8px; }
        .brutus-says-text { font-size: 13px; line-height: 1.6; font-style: italic; color: rgba(255,255,255,0.7); }
        .card-footer { text-align: center; }
        .card-footer-logo { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; }
        .card-footer-url { font-size: 11px; color: rgba(255,255,255,0.2); margin-top: 2px; }

        /* Secondary type */
        .secondary-type .inner { padding: 20px 24px; }
        .secondary-type .secondary-row { display: flex; align-items: center; gap: 14px; }
        .secondary-bar { width: 8px; height: 32px; border-radius: 4px; flex-shrink: 0; }
        .secondary-name { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; color: #fff; }
        .secondary-liner { font-size: 13px; font-style: italic; color: rgba(255,255,255,0.5); margin-top: 3px; }
        .secondary-blend { font-size: 12px; color: rgba(255,255,255,0.25); margin-top: 12px; }

        /* Coaching tip */
        .coaching-tip { background: rgba(255,80,80,0.05); border: 1px solid rgba(255,80,80,0.18); border-radius: 20px; padding: 20px 24px; }
        .coaching-tip-label { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: lowercase; letter-spacing: 0.08em; color: rgba(255,80,80,0.8); margin-bottom: 8px; }
        .coaching-tip-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); }

        /* Score chart */
        .score-chart { padding: 24px; }
        .score-chart-label { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: lowercase; letter-spacing: 0.08em; color: rgba(255,80,80,0.7); margin-bottom: 18px; }
        .score-rows { display: flex; flex-direction: column; gap: 12px; }
        .score-row { display: flex; align-items: center; gap: 10px; }
        .score-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .score-name { font-family: 'Space Mono', monospace; font-size: 11px; }
        .score-track { flex: 1; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.06); overflow: hidden; }
        .score-fill { height: 100%; border-radius: 2px; transition: width 0.7s ease-out; }
        .score-num { font-family: 'Space Mono', monospace; font-size: 11px; width: 28px; text-align: right; flex-shrink: 0; }

        /* DNA report */
        .dna-report { padding: 20px 24px; }
        .dna-report-title { font-family: 'Space Mono', monospace; font-size: 12px; text-transform: lowercase; letter-spacing: 0.08em; color: rgba(255,80,80,0.8); margin-bottom: 20px; }
        .report-section-label { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 10px; }
        .drill-list { list-style: none; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .drill-item { display: flex; gap: 12px; }
        .drill-num { flex-shrink: 0; width: 20px; height: 20px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700; background: rgba(255,176,80,0.12); color: #ffb050; }
        .drill-text { font-size: 14px; line-height: 1.6; color: rgba(255,255,255,0.8); }
        .matchup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .matchup-box { padding: 14px; border-radius: 12px; }
        .matchup-crush { background: rgba(80,220,100,0.05); border: 1px solid rgba(80,220,100,0.12); }
        .matchup-destroy { background: rgba(255,80,80,0.05); border: 1px solid rgba(255,80,80,0.12); }
        .matchup-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        .matchup-list li { font-size: 12px; color: rgba(255,255,255,0.7); display: flex; gap: 6px; }
        .manager-guide-box { padding: 14px 16px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); }
        .manager-guide-text { font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.6); }

        /* Share panel */
        .share-panel { padding: 24px; }
        .share-label { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: lowercase; letter-spacing: 0.08em; color: rgba(255,80,80,0.7); margin-bottom: 14px; }
        .share-btns { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
        .share-btn { flex: 1; min-width: 100px; padding: 11px 12px; border-radius: 12px; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; border: none; }
        .btn-download { width: 100%; padding: 13px; border-radius: 12px; font-weight: 600; font-size: 14px; color: #fff; background: linear-gradient(135deg, var(--red-primary), var(--red-secondary)); border: none; cursor: pointer; transition: all 0.3s; font-family: inherit; }
        .btn-download:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,80,80,0.35); }

        /* Team challenge */
        .team-panel { padding: 24px; }
        .team-title { font-family: 'Space Mono', monospace; font-size: 13px; font-weight: 700; color: #fff; margin-bottom: 4px; }
        .team-sub { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 14px; }
        .team-link-row { display: flex; gap: 10px; }
        .team-link-display { flex: 1; padding: 10px 14px; border-radius: 12px; font-family: 'Space Mono', monospace; font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.45); }
        .btn-copy { padding: 10px 16px; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; border: none; font-family: inherit; }

        /* CTA */
        .cta-panel { background: rgba(20,20,35,0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,80,80,0.25); border-radius: 20px; box-shadow: 0 0 40px rgba(255,80,80,0.12), 0 8px 32px rgba(0,0,0,0.4); padding: 28px 24px; text-align: center; }
        .cta-title { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: #fff; margin-bottom: 8px; }
        .cta-sub { font-size: 15px; font-weight: 600; color: #ff7850; margin-bottom: 6px; }
        .cta-body { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 20px; line-height: 1.6; }
        .btn-cta { display: inline-block; padding: 14px 32px; border-radius: 12px; font-weight: 700; font-size: 15px; color: #fff; background: linear-gradient(135deg, var(--red-primary), var(--red-secondary)); box-shadow: 0 4px 24px rgba(255,80,80,0.4); text-decoration: none; transition: all 0.3s; }
        .btn-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(255,80,80,0.5); }

        /* Retake */
        .btn-retake { padding: 11px 24px; border-radius: 40px; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.3s; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); font-family: 'Space Mono', monospace; }
        .btn-retake:hover { color: rgba(255,255,255,0.8); border-color: rgba(255,80,80,0.3); }

        /* Modal */
        .modal-overlay { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 9000; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); }
        .modal-box { max-width: 440px; width: 100%; border-radius: 20px; padding: 24px; background: rgba(20,20,35,0.98); border: 1px solid rgba(255,80,80,0.3); box-shadow: 0 16px 48px rgba(0,0,0,0.6); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .modal-title { font-family: 'Space Mono', monospace; font-size: 13px; color: #fff; }
        .modal-close { background: none; border: none; font-size: 22px; color: rgba(255,255,255,0.4); cursor: pointer; line-height: 1; }
        .modal-hint { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
        .modal-textarea { width: 100%; padding: 12px 14px; border-radius: 12px; font-size: 13px; resize: none; margin-bottom: 12px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); font-family: inherit; }
        .modal-actions { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 11px; border-radius: 12px; font-weight: 600; font-size: 13px; cursor: pointer; font-family: inherit; transition: all 0.15s; }

        /* Animations */
        @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fade-in { animation: fadeIn 0.5s ease both; }

        /* Mobile */
        @media (max-width: 600px) {
            nav { padding: max(16px, env(safe-area-inset-top)) 20px 16px; }

    function calculateScores(answers) {
        const scores = {bulldozer:0,people_pleaser:0,scientist:0,ghost:0,closer:0,robot:0,storyteller:0,sniper:0};
        for (const [qi, ai] of Object.entries(answers)) {
            const q = QUESTIONS[parseInt(qi)];
            if (!q) continue;
            const a = q.answers[ai];
            if (!a) continue;
            for (const [k, v] of Object.entries(a.scores)) scores[k] += v;
        }
        return scores;
    }

    function getTopTwo(scores) {
        const sorted = [...ARCHETYPE_ORDER].sort((a, b) => scores[b] - scores[a]);
        return [sorted[0], sorted[1]];
    }

    function getScorePercent(scores, key) {
        const max = Math.max(...Object.values(scores));
        if (max === 0) return 0;
        return Math.round((scores[key] / max) * 100);
    }

    function renderQuestion() {
        window.scrollTo(0, 0);
        const q = QUESTIONS[state.currentQ];
        const pct = ((state.currentQ) / QUESTIONS.length) * 100;
        document.getElementById('progress-bar').style.width = pct + '%';

        const el = document.getElementById('question-container');
        el.innerHTML = `
            <p class="q-meta">question ${state.currentQ + 1} of ${QUESTIONS.length}</p>
            <p class="q-scenario">${q.scenario}</p>
            ${q.answers.map((a, i) => `
                <button class="answer-btn" onclick="selectAnswer(${i})">${a.text}</button>
            `).join('')}
        `;
    }

    function selectAnswer(answerIndex) {
        state.answers[state.currentQ] = answerIndex;

        // Highlight selection briefly, then advance
        document.querySelectorAll('.answer-btn').forEach((b, i) => {
            if (i === answerIndex) b.classList.add('selected');
        });

        setTimeout(() => {
            if (state.currentQ < QUESTIONS.length - 1) {
                state.currentQ++;
                renderQuestion();
            } else {
                finishQuiz();
            }
        }, 220);
    }

        const scores = calculateScores(state.answers);
        const [primary, secondary] = getTopTwo(scores);

        state.primaryKey = primary;

    // ── NEURAL NETWORK ────────────────────────────────────────────────────────

    const canvas = document.getElementById('neural-canvas');
    const ctx = canvas.getContext('2d');
    let nodes = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; initNodes(); }
    function initNodes() {
        nodes = [];
        const n = Math.floor((canvas.width * canvas.height) / 50000);
        for (let i = 0; i < n; i++) nodes.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, vx: (Math.random()-0.5)*0.3, vy: (Math.random()-0.5)*0.3, radius: Math.random()*2+1, pulse: Math.random()*Math.PI*2, type: Math.random()>0.85?'active':'normal' });
    }
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = 0; i < nodes.length; i++) for (let j = i+1; j < nodes.length; j++) {
            const dx = nodes[i].x-nodes[j].x, dy = nodes[i].y-nodes[j].y, dist = Math.sqrt(dx*dx+dy*dy);
            if (dist < 180) { ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.strokeStyle=`rgba(255,80,80,${(1-dist/180)*0.12})`; ctx.lineWidth=1; ctx.stroke(); }
        }
        nodes.forEach(n => { n.pulse+=0.02; const s=Math.sin(n.pulse)*0.5+1; ctx.beginPath(); ctx.arc(n.x,n.y,n.radius*s,0,Math.PI*2); ctx.fillStyle=n.type==='active'?'rgba(255,80,80,0.6)':'rgba(100,150,255,0.4)'; ctx.fill(); n.x+=n.vx; n.y+=n.vy; if(n.x<0||n.x>canvas.width)n.vx*=-1; if(n.y<0||n.y>canvas.height)n.vy*=-1; });
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas(); draw();
